# ============================================================================
# Data configuration
# Mirrors LAND paper Section 3 "Datasets and Evaluation" + Section 2 mask encoding
# ============================================================================

paths:
  lidc_raw_dir: "/data/raw/LIDC-IDRI"          # NBIA Data Retriever output (DICOM series)
  nlst_raw_dir: "/data/raw/NLST"               # only needed for held-out inference masks, not training
  processed_dir: "/data/processed/land"        # resampled volumes + mask tensors land here
  lung_seg_cache_dir: "/data/processed/land/lung_masks"
  nodule_seg_cache_dir: "/data/processed/land/nodule_masks"
  splits_file: "/data/processed/land/splits.json"

volume:
  # Paper: "volumetric images of size 256x256x256 at 1 mm isotropic resolution"
  target_shape: [256, 256, 256]
  target_spacing_mm: [1.0, 1.0, 1.0]
  # HU windowing before intensity normalization to [-1, 1] (standard lung window, paper says
  # "preprocessed as in [6]" i.e. the WDM paper's lung CT preprocessing -- verify against [6]
  # once we pull that repo's preprocessing script; this is our best-documented assumption).
  hu_window: [-1000, 400]
  intensity_range_out: [-1.0, 1.0]

mask_encoding:
  # Paper Section 2: "Spatial and textural cues are encoded by assigning lungs a value of 0.5
  # and nodules 1-5 (non-solid to solid). Masks are normalized to [0,1]..."
  #
  # ASSUMPTION (not fully spelled out in the paper -- flagged for validation once we can compare
  # against real samples or hear back from the authors): lung voxels get a fixed value of 0.5;
  # nodule voxels get their raw texture score (1-5) divided by 5, overwriting the lung value at
  # nodule locations. Healthy (no-nodule) samples use an all-zero nodule channel.
  lung_value: 0.5
  nodule_texture_scale_max: 5.0   # raw texture score (1-5) divided by this
  empty_nodule_value: 0.0
  # "downsampled four times via 3D max pooling" before concatenation with the noisy latent
  mask_downsample_factor: 4
  mask_downsample_mode: "max_pool"

nodule_texture_labels:
  1: "non-solid"
  2: "non-solid-mixed"
  3: "part-solid"
  4: "solid-mixed"
  5: "solid"

split:
  train_fraction: 0.85
  val_fraction: 0.10
  test_fraction: 0.05
  seed: 42

dataloader:
  batch_size: 1        # paper uses batch size 1 for both VAE and diffusion U-Net training
  num_workers: 4
  pin_memory: true

patch:
  # Added after the 8GB dev-card OOM on the full 256^3 encoder forward pass (see NOTES.md):
  # the first ResBlock conv alone needs 54GB at 256^3. Training (and, later, inference) runs on
  # cubic crops of this size instead of the full volume. Must divide evenly by
  # mask_encoding.mask_downsample_factor (4) -- 128 and 96 both do.
  #   128^3 -> ~6.75GB for that same conv op (workable on 8GB with room for the rest of the model)
  #   96^3  -> ~2.8GB  (more headroom, smaller receptive-field context per patch)
  # Set to `null` to disable patching and use full 256^3 volumes (will OOM on <~24GB cards).
  size: 128
  # Fraction of patches (tumor samples only -- healthy samples have no nodule voxels to center
  # on) centered on a real nodule voxel instead of placed uniformly at random. Nodules are a
  # small fraction of total lung volume, so plain random crops at 96-128^3 would often contain
  # zero nodule voxels -- a real quality risk for a model meant to eventually generate
  # convincing synthetic nodules, not something to defer to "later, once patching works."
  nodule_centered_prob: 0.7
